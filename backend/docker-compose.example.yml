version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://hnina:CHANGE_ME@db:5432/hnina
      ALLOWED_ORIGINS: https://hnina.shop,https://www.hnina.shop
      SHEET_WEBHOOK_URL: ""
      META_PIXEL_ID: ""
      META_ACCESS_TOKEN: ""
      TIKTOK_PIXEL_CODE: ""
      TIKTOK_ACCESS_TOKEN: ""
      SNAP_PIXEL_ID: ""
      SNAP_ACCESS_TOKEN: ""
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hnina
      POSTGRES_USER: hnina
      POSTGRES_PASSWORD: CHANGE_ME
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
